<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Bitcoin Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 20px auto;
      padding: 0 10px;
    }
    h1 {
      text-align: center;
    }
    .buttons {
      text-align: center;
      margin-bottom: 20px;
    }
    button {
      margin: 0 5px;
      padding: 8px 14px;
      cursor: pointer;
    }
    .stats {
      text-align: center;
      margin-bottom: 20px;
    }
    #chart {
      max-width: 700px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <h1>Live Bitcoin Dashboard</h1>

  <div class="buttons">
    <button onclick="loadData(30)">Last 30 Days</button>
    <button onclick="loadData(60)">Last 60 Days</button>
    <button onclick="loadData(90)">Last 90 Days</button>
  </div>

  <div class="stats">
    <p id="avg">Average Price: -</p>
    <p id="high">High Price: -</p>
    <p id="low">Low Price: -</p>
  </div>

  <div id="chart"></div>

  <script>
    async function fetchBtcData(days) {
      const start = performance.now();  // start timer for performance measurement
      const url = "https://api.binance.com/api/v3/klines";
      const params = new URLSearchParams({
        symbol: "BTCUSDT",
        interval: "1d",
        limit: days.toString()
      });

      const response = await fetch(`${url}?${params.toString()}`);
      const data = await response.json();

      const end = performance.now();  // end timer for performance measurement

      console.log(`Data fetch and processing for ${days} days took ${end - start} ms`);

      const dates = [];
      const prices = [];

      for (const row of data) {
        const openTime = row[0];   // ms
        const close = parseFloat(row[4]);

        dates.push(new Date(openTime));
        prices.push(close);
      }


      return { dates, prices };
    }

    function updateStats(prices) {
      const avg =
        prices.reduce((sum, p) => sum + p, 0) / prices.length;
      const high = Math.max(...prices);
      const low = Math.min(...prices);

      document.getElementById("avg").textContent =
        `Average Price: $${avg.toFixed(2)}`;
      document.getElementById("high").textContent =
        `High Price: $${high.toFixed(2)}`;
      document.getElementById("low").textContent =
        `Low Price: $${low.toFixed(2)}`;
    }

    function renderChart(dates, prices, days) {
      let title = ""; 

      if(days === 30) {
        title = "BTCUSDT Price - Last 30 Days";
      } else if(days === 60) {
        title = "BTCUSDT Price - Last 60 Days";
      } else if(days === 90) {
        title = "BTCUSDT Price - Last 90 Days";
      }

      const trace = {
        x: dates,
        y: prices,
        type: "scatter",
        mode: "lines",
        name: "BTCUSDT"
      };

      const layout = {
        title: title,
        xaxis: { title: "Date" },
        yaxis: { title: "Price (USDT)" }
      };
      const renderStart = performance.now();

      Plotly.newPlot("chart", [trace], layout, { responsive: true });

      const renderEnd = performance.now();

      console.log(`Chart render time (${days} days): ${renderEnd - renderStart} ms`);
    }

    async function loadData(days) {
      try {
        const { dates, prices } = await fetchBtcData(days);
        updateStats(prices);
        renderChart(dates, prices, days);
      } catch (err) {
        console.error(err);
        alert("Failed to load data from Binance.");
      }
    }

    // Load 30 days by default
    loadData(30);
  </script>
</body>
</html>
